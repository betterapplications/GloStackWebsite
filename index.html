<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GloStack — Download on the App Store</title>
  <meta name="description" content="GloStack — download our iOS app on the App Store." />

  <!-- Open Graph / social preview -->
  <meta property="og:title" content="GloStack" />
  <meta property="og:description" content="Download GloStack on the App Store." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://glostack.app" />
  <meta property="og:image" content="https://glostack.app/assets/og-image.png" />

  <link rel="icon" href="assets/favicon.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">

    <!-- Header / logo -->
    <header class="site-header">
      <a class="brand" href="/">
        <span class="brand-dot"></span>
        <span class="brand-word">GloStack</span>
      </a>
    </header>

    <!-- Cream main panel -->
    <main class="main-panel">

      <!-- Phones cluster -->
      <div class="phone-cluster">
        <div class="phone-cluster-scale">

          <!-- Floating placeholder cards (behind phones) -->
          <div class="card card-orange" data-placeholder="Orange"><span>Orange</span></div>
          <div class="card card-yellow" data-placeholder="Yellow"><span>Yellow</span></div>
          <div class="card card-blue" data-placeholder="Blue"><span>Blue</span></div>
          <div class="card card-purple" data-placeholder="Purple"><span>Purple</span></div>

          <!-- Phone 1 (left) -->
          <div class="phone phone-left">
            <div class="phone-bezel">
              <div class="phone-screen">
                <div class="notch"></div>
                <div class="screen-img" data-placeholder="Screen (left)"><span>Screen (left)</span></div>
              </div>
            </div>
          </div>

          <!-- Phone 2 (right) -->
          <div class="phone phone-right">
            <div class="phone-bezel">
              <div class="phone-screen">
                <div class="notch"></div>
                <div class="screen-img" data-placeholder="Screen (right)"><span>Screen (right)</span></div>
              </div>
            </div>
          </div>

        </div>
      </div>

      <!-- App Store badge -->
      <div class="badge-col">
        <a class="store-badge" href="#" aria-label="Download on the App Store">
          <img src="assets/app-store-badge.svg" alt="Download on the App Store" width="200" height="67" />
        </a>
      </div>

    </main>

    <!-- Footer -->
    <footer class="site-footer">
      <nav class="footer-links">
        <a href="terms.html">Terms of Service</a>
        <a href="privacy.html">Privacy Policy</a>
        <a href="mailto:glostack.app@gmail.com">Contact Us</a>
      </nav>
      <span class="footer-copy">&copy; <span id="year">2026</span> GloStack</span>
    </footer>

  </div>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
